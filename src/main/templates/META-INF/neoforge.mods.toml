modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description='''
Dust off what has been forgotten and reach for the skies.
Sistema de stages global (estilo Hardmode de Terraria), gating de equipo
por progresion, eventos de boss y Luna de Sangre. Logica de runtime nativa,
portada desde la capa KubeJS original para eliminar el polling por tick.
'''

# --- Dependencias obligatorias ---
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# --- Mods de contenido: OPCIONALES, cargados ANTES de este mod ---
# Toda interaccion con ellos es por ResourceLocation (string), nunca por sus
# clases Java; por eso son 'optional' y no requieren compileOnly. AFTER asegura
# que sus EntityTypes esten registrados cuando nuestros listeners corran.
[[dependencies.${mod_id}]]
    modId="galosphere"
    type="optional"
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="caverns_and_chasms"
    type="optional"
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="hominid"
    type="optional"
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="illagerinvasion"
    type="optional"
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="raidsenhanced"
    type="optional"
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="takesapillage"
    type="optional"
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"
